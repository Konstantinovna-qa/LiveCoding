name: UI Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      LOGIN: ${{ secrets.LOGIN }}
      PASSWORD: ${{ secrets.PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Clean old allure artifacts
        run: |
          rm -rf allure-results allure-report
          mkdir -p allure-results

      - name: Build container
        run: docker compose build

      - name: Run tests
        run: docker compose run --rm regression
        continue-on-error: true

      - name: Show allure results
        if: always()
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "allure-results:"
          ls -la allure-results || true
          find allure-results -maxdepth 1 -type f | sort || true

      - name: Upload raw allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        if: always()
        run: |
          curl -L -o allure.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.13.8/allure-commandline-2.13.8.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.13.8 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure report
        if: always()
        run: |
          allure generate ./allure-results --clean -o ./allure-report
          echo "allure-report:"
          find allure-report -maxdepth 2 -type f | sort | head -100
          echo "summary widget:"
          cat allure-report/widgets/summary.json

      - name: Upload generated Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Pages artifact
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4