name: UI Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      LOGIN: ${{ secrets.LOGIN }}
      PASSWORD: ${{ secrets.PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Clean old allure artifacts
        run: |
          rm -rf allure-results allure-report old-pages
          mkdir -p allure-results

      - name: Checkout gh-pages for history
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: old-pages
        continue-on-error: true

      - name: Restore Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d old-pages/history ]; then
            cp -R old-pages/history/. allure-results/history/
            echo "History restored from gh-pages"
          else
            echo "No previous history found"
          fi

      - name: Build container
        run: docker compose build

      - name: Run tests
        run: docker compose run --rm regression pytest -sv --alluredir=allure-results
        continue-on-error: true

      - name: Show allure results
        if: always()
        run: |
          echo "allure-results:"
          ls -la allure-results || true
          find allure-results -maxdepth 2 -type f | sort || true

      - name: Upload raw allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        if: always()
        run: |
          curl -L -o allure.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.39.0/allure-commandline-2.39.0.tgz
          tar -xzf allure.tgz
          sudo rm -rf /opt/allure
          sudo mv allure-2.39.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure report
        if: always()
        run: |
          allure generate ./allure-results --clean -o ./allure-report
          echo "summary:"
          cat allure-report/widgets/summary.json || true
          echo "history:"
          ls -la allure-report/history || true

      - name: Upload generated Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Pages artifact
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4