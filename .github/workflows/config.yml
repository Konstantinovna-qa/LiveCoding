name: UI Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3  # Обновил до v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run UI-tests via docker compose
        env:
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          # Создаём volume для результатов
          docker compose up --exit-code-from regression --abort-on-container-exit
        continue-on-error: true  # Продолжаем даже если тесты упали

      - name: Generate Allure report
        run: |
          # Копируем allure-results из контейнера
          docker compose cp regression:/app/allure-results ./allure-results
          # Генерируем отчёт
          docker compose run --rm regression allure generate ./allure-results --clean -o ./allure-report
        continue-on-error: true

      - name: Upload Allure results (для отладки)
        uses: actions/upload-artifact@v3
        if: always()  # Загружаем даже при ошибке
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.6.0  # Обновил версию
        with:
          token: ${{ secrets.CI_TOKEN }}
          branch: gh-pages
          folder: allure-report
          clean: true
          clean-exclude: |
            .nojekyll