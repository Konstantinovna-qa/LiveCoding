name: UI Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      LOGIN: ${{ secrets.LOGIN }}
      PASSWORD: ${{ secrets.PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container
        run: docker compose build

      - name: Run tests
        run: docker compose run --rm regression
        continue-on-error: true

      - name: Check allure results
        if: always()
        run: |
          echo "Project root:"
          pwd
          ls -la
          echo "Allure results:"
          ls -la allure-results || true
          find allure-results -maxdepth 1 -type f || true

      -  name: Install Allure
         if: always()
         run: |
            sudo apt-get update
            sudo apt-get install -y default-jre
            wget https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.13.8/allure-commandline-2.13.8.tgz
            tar -zxvf allure-commandline-2.13.8.tgz
            sudo mv allure-2.13.8 /opt/allure
            sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure report
        if: always()
        run: |
         allure generate allure-results -o allure-report --clean
        

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy report
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          branch: gh-pages
          folder: allure-report